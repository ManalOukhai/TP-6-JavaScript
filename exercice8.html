<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau de bord - Etudiants</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}

header{
  margin-bottom:10px;
}

input{
  padding:6px;
  margin:3px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
  cursor:pointer;
}

tr:nth-child(even){
  background:#f9f9f9;
}

/* survol */
.hover{
  background:#e8f0fe !important;
}

/* mentions */
.badge{
  padding:3px 6px;
  border-radius:4px;
  color:white;
}

.red{background:#dc3545}
.orange{background:#fd7e14}
.yellow{background:#ffc107;color:black}
.blue{background:#0d6efd}
.green{background:#198754}

#statistiques{
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="app">

<header>
<h1>Tableau de bord - Etudiants</h1>
<input type="text" id="recherche" placeholder="Rechercher... (Ctrl+F)">
</header>

<div>
<input type="text" id="nom" placeholder="Nom">
<input type="text" id="prenom" placeholder="Prenom">
<input type="number" id="note" placeholder="Note /20">
<button id="btnAjouter">Ajouter</button>
</div>

<table>
<thead>
<tr>
<th data-col="nom">Nom</th>
<th data-col="prenom">Prenom</th>
<th data-col="note">Note</th>
<th>Mention</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="corpsTableau"></tbody>
</table>

<div id="statistiques"></div>

</div>

<script>
const tbody = document.getElementById("corpsTableau");
const btn = document.getElementById("btnAjouter");
const recherche = document.getElementById("recherche");

let ordreTri = {}; // pour chaque colonne

// -------- MENTION --------
function getMention(note){
  if(note < 10) return ["Insuffisant","red"];
  if(note < 12) return ["Passable","orange"];
  if(note < 14) return ["Assez Bien","yellow"];
  if(note < 16) return ["Bien","blue"];
  return ["Tres Bien","green"];
}

// -------- STATISTIQUES --------
function updateStats(){
  const rows = [...tbody.querySelectorAll("tr")];

  const notes = rows.map(r => +r.dataset.note);

  if(notes.length === 0){
    document.getElementById("statistiques").textContent =
      "Aucun etudiant";
    return;
  }

  const sum = notes.reduce((a,b)=>a+b,0);
  const avg = (sum / notes.length).toFixed(2);

  document.getElementById("statistiques").textContent =
    `Etudiants: ${notes.length} | Moyenne: ${avg} | Max: ${Math.max(...notes)} | Min: ${Math.min(...notes)}`;
}

// -------- AJOUT --------
btn.addEventListener("click", ()=>{

  const nom = document.getElementById("nom").value.trim();
  const prenom = document.getElementById("prenom").value.trim();
  const note = +document.getElementById("note").value;

  if(!nom || !prenom || note < 0 || note > 20) return;

  const tr = document.createElement("tr");

  tr.dataset.nom = nom.toLowerCase();
  tr.dataset.prenom = prenom.toLowerCase();
  tr.dataset.note = note;

  const [mention, cls] = getMention(note);

  tr.innerHTML = `
    <td>${nom}</td>
    <td>${prenom}</td>
    <td>${note}</td>
    <td><span class="badge ${cls}">${mention}</span></td>
    <td><button class="sup">Supprimer</button></td>
  `;

  // suppression
  tr.querySelector(".sup").addEventListener("click", ()=>{
    tbody.removeChild(tr);
    updateStats();
  });

  // hover
  tr.addEventListener("mouseenter", ()=>tr.classList.add("hover"));
  tr.addEventListener("mouseleave", ()=>tr.classList.remove("hover"));

  tbody.appendChild(tr);

  document.getElementById("nom").value="";
  document.getElementById("prenom").value="";
  document.getElementById("note").value="";

  updateStats();
});

// -------- RECHERCHE --------
recherche.addEventListener("input", ()=>{

  const val = recherche.value.toLowerCase();

  [...tbody.querySelectorAll("tr")].forEach(tr=>{
    const nom = tr.dataset.nom;
    const prenom = tr.dataset.prenom;

    tr.style.display =
      (nom.includes(val) || prenom.includes(val)) ? "" : "none";
  });
});

// -------- CTRL+F / ESC --------
window.addEventListener("keydown",(e)=>{

  if(e.ctrlKey && e.key === "f"){
    e.preventDefault();
    recherche.focus();
  }

  if(e.key === "Escape"){
    recherche.value = "";
    recherche.dispatchEvent(new Event("input"));
  }
});

// -------- TRI --------
document.querySelectorAll("th[data-col]").forEach(th=>{

  th.addEventListener("click", ()=>{

    const col = th.dataset.col;

    ordreTri[col] = !ordreTri[col]; // toggle

    const rows = [...tbody.querySelectorAll("tr")];

    rows.sort((a,b)=>{

      let A = a.dataset[col];
      let B = b.dataset[col];

      if(col === "note"){
        A = +A; B = +B;
      }

      return ordreTri[col] ? A > B : A < B;
    });

    tbody.innerHTML = "";
    rows.forEach(r=>tbody.appendChild(r));
  });
});
</script>

</body>
</html>
